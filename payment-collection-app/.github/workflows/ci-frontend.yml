name: CI — Validate Frontend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Check Expo config
        run: npx expo-doctor || true

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Build info
        run: |
          echo "✅ Frontend validated successfully"
          echo "📱 Run 'npx expo start' locally to test"
          echo "📦 Run 'eas build' for production builds"
