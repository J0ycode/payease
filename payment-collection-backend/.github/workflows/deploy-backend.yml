name: Deploy Backend to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # Issue #16: Pinned to an immutable release tag (not @master) to prevent
      # silent supply-chain updates from injecting code into the deploy pipeline.
      - name: Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/payment-collection-backend
            git pull origin main
            npm install --production
            pm2 restart payment-backend || pm2 start server.js --name payment-backend
            pm2 save
